<div class="fixed inset-x-0 bottom-0 z-50 flex flex-col items-center">

<input class="flex h-16 w-14 text-center text-2xl font-bold border-0 border-b-2 border-gray-200 dark:border-gray-700 bg-transparent focus:border-primary focus:ring-0 text-[#0d121b] dark:text-white transition-colors" max="9" maxlength="1" oninput="if(this.value.length &gt; 1) this.value = this.value.slice(0, 1); if(this.value.length == 1) this.nextElementSibling?.focus()" onkeydown="if(event.key === 'Backspace' &amp;&amp; !this.value) this.previousElementSibling?.focus()" placeholder="-" type="number"/>
<input class="flex h-16 w-14 text-center text-2xl font-bold border-0 border-b-2 border-gray-200 dark:border-gray-700 bg-transparent focus:border-primary focus:ring-0 text-[#0d121b] dark:text-white transition-colors" max="9" maxlength="1" oninput="if(this.value.length &gt; 1) this.value = this.value.slice(0, 1); if(this.value.length == 1) this.nextElementSibling?.focus()" onkeydown="if(event.key === 'Backspace' &amp;&amp; !this.value) this.previousElementSibling?.focus()" placeholder="-" type="number"/>
<input class="flex h-16 w-14 text-center text-2xl font-bold border-0 border-b-2 border-gray-200 dark:border-gray-700 bg-transparent focus:border-primary focus:ring-0 text-[#0d121b] dark:text-white transition-colors" max="9" maxlength="1" oninput="if(this.value.length &gt; 1) this.value = this.value.slice(0, 1);" onkeydown="if(event.key === 'Backspace' &amp;&amp; !this.value) this.previousElementSibling?.focus()" placeholder="-" type="number"/>
</div>

<p class="text-gray-500 dark:text-gray-400 text-sm mb-2">Didn't receive the code?</p>
<button class="text-primary text-base font-semibold hover:text-primary/80 transition-colors">

                    </button>
<p class="mt-4 text-[10px] text-gray-400 uppercase tracking-widest font-medium">Available in 00:45</p>
</div>
<div class="pt-2">

                    </button>
<div class="mt-6 flex flex-col items-center">
<div class="flex items-center gap-2 text-gray-400 text-xs">
<span class="material-symbols-outlined text-sm">lock</span>
<span>Secure Exam Environment</span>
</div>
</div>
</div>

<div class="h-8 w-full bg-white dark:bg-[#1a1f2e]"></div>
