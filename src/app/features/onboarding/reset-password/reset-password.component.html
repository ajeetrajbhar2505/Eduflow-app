<!-- Top Navigation Bar -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 sticky top-0 z-10">
<button aria-label="Go back" class="text-primary flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-[28px]">arrow_back_ios_new</span>
</button>
</header>
<main class="flex-1 px-4 max-w-[480px] mx-auto w-full flex flex-col">
<!-- Header Section -->
<div class="pt-6 pb-8">
<h1 class="text-[#0d121b] dark:text-white tracking-tight text-[32px] font-bold leading-tight text-left">
                Reset Password
            </h1>
<p class="text-[#4c669a] dark:text-gray-400 text-base font-normal leading-normal pt-2">
                Enter your new password below to secure your account and continue your exams.
            </p>
</div>
<!-- Form Section -->
<div class="space-y-4">
<!-- New Password Field -->
<div class="flex flex-col w-full">
<label class="flex flex-col w-full">
<p class="text-[#0d121b] dark:text-gray-200 text-sm font-semibold leading-normal pb-2 px-1">New Password</p>
<div class="flex w-full items-stretch rounded-xl overflow-hidden shadow-sm">
<input class="form-input flex w-full min-w-0 flex-1 resize-none rounded-l-xl text-[#0d121b] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#cfd7e7] dark:border-gray-700 bg-white dark:bg-[#1a2133] focus:border-primary h-14 placeholder:text-[#94a3b8] p-[15px] border-r-0 pr-2 text-base font-normal leading-normal transition-all" placeholder="Enter new password" type="password" value=""/>
<button class="text-[#4c669a] dark:text-gray-400 flex border border-[#cfd7e7] dark:border-gray-700 bg-white dark:bg-[#1a2133] items-center justify-center pr-[15px] rounded-r-xl border-l-0 focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</label>
</div>
<!-- Confirm New Password Field -->
<div class="flex flex-col w-full">
<label class="flex flex-col w-full">
<p class="text-[#0d121b] dark:text-gray-200 text-sm font-semibold leading-normal pb-2 px-1">Confirm New Password</p>
<div class="flex w-full items-stretch rounded-xl overflow-hidden shadow-sm">
<input class="form-input flex w-full min-w-0 flex-1 resize-none rounded-l-xl text-[#0d121b] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#cfd7e7] dark:border-gray-700 bg-white dark:bg-[#1a2133] focus:border-primary h-14 placeholder:text-[#94a3b8] p-[15px] border-r-0 pr-2 text-base font-normal leading-normal transition-all" placeholder="Confirm your password" type="password" value=""/>
<button class="text-[#4c669a] dark:text-gray-400 flex border border-[#cfd7e7] dark:border-gray-700 bg-white dark:bg-[#1a2133] items-center justify-center pr-[15px] rounded-r-xl border-l-0 focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</label>
</div>
</div>
<!-- Security Hints -->
<div class="mt-6 space-y-2 px-1">
<div class="flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400">
<span class="material-symbols-outlined text-sm text-green-500">check_circle</span>
<span>Minimum 8 characters</span>
</div>
<div class="flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400">
<span class="material-symbols-outlined text-sm">circle</span>
<span>At least one number or symbol</span>
</div>
</div>
<!-- Spacer for layout -->
<div class="flex-grow"></div>
<!-- Action Button Section -->
<div class="pb-10 pt-6">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] shadow-lg shadow-primary/30 active:scale-[0.98] transition-all">
<span class="truncate">Update Password</span>
</button>
<p class="text-center text-xs text-gray-400 dark:text-gray-500 mt-4">
                Your password must be different from previous passwords used.
            </p>
</div>
</main>
