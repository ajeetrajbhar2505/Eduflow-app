<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Social Login Loading State</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        .ios-blur {
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin 1.5s linear infinite;
        }
        @keyframes slide-up {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slide-up 0.5s cubic-bezier(0.32, 0.72, 0, 1) forwards;
        }
    </style>
<style>
        body {
            min-height: 100dvh;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen relative overflow-hidden">
<div class="absolute inset-0 z-0 flex flex-col p-6 opacity-40 grayscale-[0.5]">
<div class="flex items-center justify-between mb-12">
<span class="material-symbols-outlined text-2xl">arrow_back_ios</span>
<div class="w-8 h-8 bg-gray-200 rounded-full"></div>
</div>
<div class="space-y-6">
<div class="h-10 w-48 bg-gray-300 rounded"></div>
<div class="h-4 w-64 bg-gray-200 rounded"></div>
<div class="space-y-4 pt-8">
<div class="h-14 w-full border border-gray-300 rounded-xl"></div>
<div class="h-14 w-full border border-gray-300 rounded-xl"></div>
<div class="h-14 w-full bg-primary rounded-xl"></div>
</div>
<div class="flex items-center gap-4 py-6">
<div class="h-px flex-1 bg-gray-200"></div>
<div class="h-4 w-8 bg-gray-200"></div>
<div class="h-px flex-1 bg-gray-200"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="h-14 border border-gray-300 rounded-xl"></div>
<div class="h-14 border border-gray-300 rounded-xl"></div>
</div>
</div>
</div>
<div class="fixed inset-0 z-50 flex flex-col justify-end ios-blur bg-black/20 dark:bg-black/40">
<div class="flex-grow"></div>
<div class="w-full bg-white dark:bg-background-dark rounded-t-[32px] shadow-[0_-8px_30px_rgb(0,0,0,0.12)] animate-slide-up">
<div class="flex justify-center pt-4 pb-2">
<div class="w-10 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
</div>
<div class="px-8 pt-6 pb-16 flex flex-col items-center">
<div class="relative w-24 h-24 mb-10 flex items-center justify-center">
<div class="absolute inset-0 rounded-full border-4 border-primary/10"></div>
<div class="absolute inset-0 rounded-full border-4 border-transparent border-t-primary animate-spin-slow"></div>
<div class="w-16 h-16 rounded-full bg-white dark:bg-gray-800 shadow-sm flex items-center justify-center overflow-hidden">
<svg class="w-8 h-8" viewBox="0 0 24 24">

</div>
</div>
<div class="text-center space-y-3 mb-8">
<h3 class="text-[#111318] dark:text-white text-2xl font-bold leading-tight tracking-tight">
                        Signing you in safely...
                    </h3>
<div class="flex items-center justify-center gap-2">
<p class="text-[#616f89] dark:text-gray-400 text-base font-normal leading-normal">
                            Connecting to Google
                        </p>
<span class="flex gap-1">
<span class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"></span>
<span class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse delay-75"></span>
<span class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse delay-150"></span>
</span>
</div>
</div>
<div class="flex items-center gap-2 text-[#616f89]/60 dark:text-gray-500">
<span class="material-symbols-outlined text-lg">verified_user</span>
<span class="text-[10px] font-bold tracking-[0.1em] uppercase">End-to-end encrypted</span>
</div>
</div>
</div>
</div>
<div class="fixed bottom-0 left-0 right-0 h-1 z-[60] bg-gray-100 dark:bg-gray-800">
<div class="h-full bg-primary" style="width: 45%;"></div>
</div>

</body></html>
