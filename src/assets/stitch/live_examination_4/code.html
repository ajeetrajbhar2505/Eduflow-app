<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Live Examination</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>body {
    font-family: "Lexend", sans-serif;
    -webkit-tap-highlight-color: transparent
    }
.radio-dot-svg {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCnr09WxVIGM2x7wBv7K4p4igb51YrydTv0ksqN3vTIHQk_ifYfdizxxeAbGW7CVvjTxJw4dbUT9foaJu9Hj8lUO9tiP43HIR1ZrBSaca7Jwem-AhJo2YGO31IElLswsALcmgxs2jSHPBgRqJfo1PzDeLZVn1H_4icYJvPGk6_Ook8hEazdwQhjsnfkyoBGP2b8CKEfZdOuYxZpbdihzYr5dXQJBU3k0pTG6JZpyUvEQFpZZkfspn9T7kprQ3RRJckvUMtykLGpv_rx)
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 bg-background-light dark:bg-background-dark border-b border-[#324467]/30">
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-[#324467]/20 cursor-pointer">
<span class="material-symbols-outlined">close</span>
</div>
<div class="flex flex-col items-center">
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em]">Question 05 of 50</h2>
</div>
<div class="flex w-10 items-center justify-end cursor-pointer">
<span class="material-symbols-outlined text-white">grid_view</span>
</div>
</div>
<!-- Progress Bar -->
<div class="flex flex-col gap-1.5 p-4 pt-2">
<div class="flex gap-6 justify-between items-end">
<p class="text-[#92a4c9] text-xs font-medium uppercase tracking-wider">Exam Progress</p>
<p class="text-white text-sm font-semibold">10%</p>
</div>
<div class="h-1.5 w-full rounded-full bg-[#324467]/40 overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 10%;"></div>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto px-4 py-6 flex flex-col gap-6">
<!-- Timer Section -->
<div class="flex gap-3 justify-center">
<div class="flex grow basis-0 flex-col items-stretch gap-2">
<div class="flex h-12 grow items-center justify-center rounded-xl px-3 bg-[#1c263a]">
<p class="text-white text-lg font-bold">00</p>
</div>
<div class="flex items-center justify-center"><p class="text-[#92a4c9] text-[10px] font-medium uppercase">Hours</p></div>
</div>
<div class="flex grow basis-0 flex-col items-stretch gap-2">
<div class="flex h-12 grow items-center justify-center rounded-xl px-3 bg-[#1c263a] border border-primary/30">
<p class="text-white text-lg font-bold">28</p>
</div>
<div class="flex items-center justify-center"><p class="text-[#92a4c9] text-[10px] font-medium uppercase">Minutes</p></div>
</div>
<div class="flex grow basis-0 flex-col items-stretch gap-2">
<div class="flex h-12 grow items-center justify-center rounded-xl px-3 bg-[#1c263a] border border-primary/30">
<p class="text-white text-lg font-bold">45</p>
</div>
<div class="flex items-center justify-center"><p class="text-[#92a4c9] text-[10px] font-medium uppercase">Seconds</p></div>
</div>
</div>
<!-- Question Headline -->
<div class="py-2">
<h3 class="text-white tracking-tight text-xl font-semibold leading-relaxed">
                Which of the following principles is used in optical fiber communication?
            </h3>
</div>
<!-- Multiple Choice Options -->
<div class="flex flex-col gap-3" style="--radio-dot-svg: url('data:image/svg+xml,%3csvg viewBox=%270 0 16 16%27 fill=%27rgb(17,82,212)%27 xmlns=%27http://www.w3.org/2000/svg%27%3e%3ccircle cx=%278%27 cy=%278%27 r=%273%27/%3e%3c/svg%3e');">
<label class="flex items-center gap-4 rounded-xl border border-solid border-primary bg-primary/10 p-4 transition-all active:scale-[0.98]">
<input checked="" class="h-5 w-5 border-2 border-[#324467] bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0" name="exam-option" type="radio"/>
<div class="flex grow flex-col">
<p class="text-white text-base font-medium leading-normal">Total Internal Reflection</p>
</div>
<span class="material-symbols-outlined text-primary">check_circle</span>
</label>
<label class="flex items-center gap-4 rounded-xl border border-solid border-[#324467] p-4 transition-all hover:border-[#92a4c9]/50 active:scale-[0.98]">
<input class="h-5 w-5 border-2 border-[#324467] bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0" name="exam-option" type="radio"/>
<div class="flex grow flex-col">
<p class="text-white text-base font-medium leading-normal">Refraction</p>
</div>
</label>
<label class="flex items-center gap-4 rounded-xl border border-solid border-[#324467] p-4 transition-all hover:border-[#92a4c9]/50 active:scale-[0.98]">
<input class="h-5 w-5 border-2 border-[#324467] bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0" name="exam-option" type="radio"/>
<div class="flex grow flex-col">
<p class="text-white text-base font-medium leading-normal">Diffraction</p>
</div>
</label>
<label class="flex items-center gap-4 rounded-xl border border-solid border-[#324467] p-4 transition-all hover:border-[#92a4c9]/50 active:scale-[0.98]">
<input class="h-5 w-5 border-2 border-[#324467] bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0" name="exam-option" type="radio"/>
<div class="flex grow flex-col">
<p class="text-white text-base font-medium leading-normal">Scattering</p>
</div>
</label>
</div>
</main>
<!-- Footer Navigation Bar -->
<footer class="p-4 bg-background-light dark:bg-background-dark border-t border-[#324467]/30 flex flex-col gap-4 pb-8">
<div class="flex gap-3">
<button class="flex-1 h-12 flex items-center justify-center rounded-xl bg-[#232f48] text-white font-semibold text-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined text-xl mr-1">chevron_left</span>
                Previous
            </button>
<button class="flex-1 h-12 flex items-center justify-center rounded-xl border border-orange-400/50 text-orange-400 font-semibold text-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined text-xl mr-1">bookmark</span>
                Review
            </button>
<button class="flex-1 h-12 flex items-center justify-center rounded-xl bg-primary text-white font-semibold text-sm active:scale-95 transition-transform shadow-lg shadow-primary/20">
                Next
                <span class="material-symbols-outlined text-xl ml-1">chevron_right</span>
</button>
</div>
<!-- Bottom Status Indicators -->
<div class="flex justify-center items-center gap-6 px-4">
<div class="flex items-center gap-1.5">
<div class="size-2 rounded-full bg-primary"></div>
<span class="text-[10px] text-[#92a4c9] uppercase tracking-wider font-bold">Answered</span>
</div>
<div class="flex items-center gap-1.5">
<div class="size-2 rounded-full bg-orange-400"></div>
<span class="text-[10px] text-[#92a4c9] uppercase tracking-wider font-bold">Review</span>
</div>
<div class="flex items-center gap-1.5">
<div class="size-2 rounded-full bg-[#324467]"></div>
<span class="text-[10px] text-[#92a4c9] uppercase tracking-wider font-bold">Not Visited</span>
</div>
</div>
</footer>
</body></html>
