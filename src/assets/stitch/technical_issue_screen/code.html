<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Technical Issue - Exam Portal</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols Outlined -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-6">
<div class="w-full max-w-md mx-auto flex flex-col items-center">
<!-- Maintenance Illustration Container -->
<div class="relative w-full aspect-square max-w-[280px] mb-8 flex items-center justify-center">
<!-- Background Decorative Elements -->
<div class="absolute inset-0 bg-primary/10 dark:bg-primary/20 rounded-full blur-3xl opacity-50"></div>
<!-- Graphic Element -->
<div class="relative flex flex-col items-center justify-center text-primary">
<div class="bg-white dark:bg-slate-800 p-8 rounded-full shadow-xl border-4 border-primary/10">
<span class="material-symbols-outlined text-8xl" style="font-size: 120px;">
                        construction
                    </span>
</div>
<!-- Mini Floating Icons -->
<div class="absolute -top-4 -right-2 bg-primary text-white p-3 rounded-xl shadow-lg">
<span class="material-symbols-outlined">settings_suggest</span>
</div>
<div class="absolute -bottom-2 -left-4 bg-amber-400 text-white p-2 rounded-lg shadow-md rotate-12">
<span class="material-symbols-outlined">warning</span>
</div>
</div>
</div>
<!-- Text Content Section (EmptyState Style Inspired) -->
<div class="text-center space-y-4 mb-10">
<h1 class="text-[#0d121b] dark:text-white text-3xl font-bold leading-tight tracking-tight">
                We'll be right back
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed max-w-[320px] mx-auto">
                Our system is currently undergoing scheduled maintenance or facing a temporary technical issue. We are working hard to fix it. Please try again in a few minutes.
            </p>
</div>
<!-- Action Buttons (SingleButton Component Variants) -->
<div class="w-full space-y-3 px-4">
<!-- Primary Action: Refresh -->
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 bg-primary text-white text-lg font-bold shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined mr-2">refresh</span>
<span class="truncate">Refresh Page</span>
</button>
<!-- Secondary Action: Support -->
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 bg-white dark:bg-slate-800 border-2 border-primary/20 text-primary text-lg font-semibold active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined mr-2">support_agent</span>
<span class="truncate">Contact Support</span>
</button>
</div>
<!-- Security/Status Footer -->
<div class="mt-12 flex flex-col items-center opacity-50">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-sm">shield_lock</span>
<span class="text-xs font-medium uppercase tracking-widest">Secure Exam Environment</span>
</div>
<p class="text-[10px]">Error ID: EXM-9921-XPR</p>
</div>
</div>
<!-- Bottom Home Indicator Area (iOS Spacing) -->
<div class="h-8 w-full"></div>
</body></html>
