<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>App Loader Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin 1.5s linear infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen w-full flex-col items-center justify-between overflow-x-hidden p-8">
<!-- Top App Bar / Branding -->
<div class="w-full flex justify-center pt-12">
<div class="flex flex-col items-center gap-2">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-3xl">school</span>
</div>
<h1 class="text-[#0d121b] dark:text-white text-xl font-bold tracking-tight">EduFlow</h1>
</div>
</div>
<!-- Central Loading Component -->
<div class="flex flex-col items-center justify-center flex-1 w-full max-w-xs">
<!-- Circular Spinner -->
<div class="relative w-20 h-20 mb-8">
<!-- Track -->
<div class="absolute inset-0 rounded-full border-4 border-primary/10"></div>
<!-- Moving Spinner -->
<div class="absolute inset-0 rounded-full border-4 border-transparent border-t-primary animate-spin-slow"></div>
</div>
<!-- Progress Information -->
<div class="w-full flex flex-col gap-4 text-center">
<div class="flex flex-col gap-1">
<p class="text-[#0d121b] dark:text-white text-lg font-medium leading-normal">Setting up your dashboard...</p>
<p class="text-[#4f7396] dark:text-gray-400 text-sm font-normal">Please wait while we prepare your exam environment.</p>
</div>
<!-- ProgressBar Component -->
<div class="w-full px-4">
<div class="h-1.5 w-full rounded-full bg-[#cfd7e7] dark:bg-gray-700 overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 65%;"></div>
</div>
</div>
</div>
</div>
<!-- Footer / Safety Area -->
<div class="w-full flex flex-col items-center pb-8">
<div class="flex items-center gap-2 text-[#4f7396] dark:text-gray-500 mb-6">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="text-xs font-medium uppercase tracking-widest">Secure Environment</span>
</div>
<!-- Bottom Indicator Decoration (iOS style) -->
<div class="w-32 h-1.5 bg-gray-200 dark:bg-gray-800 rounded-full"></div>
</div>
<!-- Background subtle elements -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none overflow-hidden -z-10">
<div class="absolute -top-24 -left-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
</div>
</div>
</body></html>
