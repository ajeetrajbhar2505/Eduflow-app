<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OTP Verification - Online Exam App</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.25rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Lexend', sans-serif;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .bottom-sheet {
            box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.1), 0 -8px 10px -6px rgba(0, 0, 0, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen flex flex-col font-display overflow-hidden">
<div class="flex-grow flex flex-col items-center justify-center px-8 opacity-40 blur-[2px] pointer-events-none">
<div class="w-20 h-20 bg-primary rounded-2xl mb-8 flex items-center justify-center">
<span class="material-symbols-outlined text-white text-4xl">school</span>
</div>
<h1 class="text-2xl font-bold mb-2">Welcome Back</h1>
<p class="text-gray-500 mb-8">Sign in to start your exam</p>
<div class="w-full space-y-4">
<div class="h-14 bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700"></div>
<div class="h-14 bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700"></div>
<div class="h-14 bg-primary rounded-xl opacity-50"></div>
</div>
</div>
<div class="fixed inset-0 bg-black/40 backdrop-blur-[1px] z-40"></div>
<div class="fixed inset-x-0 bottom-0 z-50 flex flex-col items-center">
<div class="bottom-sheet bg-white dark:bg-[#1a1f2e] w-full max-w-md rounded-t-[2.5rem] flex flex-col overflow-hidden max-h-[90vh]">
<div class="w-full flex justify-center pt-3 pb-1">
<div class="w-10 h-1.5 bg-gray-300 dark:bg-gray-700 rounded-full"></div>
</div>
<header class="flex items-center justify-end px-6 py-2">
<button class="flex items-center text-primary font-medium text-lg focus:outline-none active:opacity-60 transition-opacity">
                    Cancel
                    <span class="material-symbols-outlined ml-1 text-[22px]">close</span>
</button>
</header>
<main class="flex flex-col px-8 pt-6 pb-12 w-full">
<div class="mb-8">
<h2 class="text-[#0d121b] dark:text-white tracking-tight text-2xl font-bold leading-tight mb-2">
                        Enter Verification Code
                    </h2>
<p class="text-gray-600 dark:text-gray-400 text-sm font-normal leading-normal">
                        Sent to <span class="font-medium text-[#0d121b] dark:text-white">st***@university.edu</span>
</p>
</div>
<div class="flex justify-between gap-3 mb-8">
<input class="flex h-16 w-14 text-center text-2xl font-bold border-0 border-b-2 border-gray-200 dark:border-gray-700 bg-transparent focus:border-primary focus:ring-0 text-[#0d121b] dark:text-white transition-colors" max="9" maxlength="1" oninput="if(this.value.length &gt; 1) this.value = this.value.slice(0, 1); if(this.value.length == 1) this.nextElementSibling?.focus()" placeholder="-" type="number"/>
<input class="flex h-16 w-14 text-center text-2xl font-bold border-0 border-b-2 border-gray-200 dark:border-gray-700 bg-transparent focus:border-primary focus:ring-0 text-[#0d121b] dark:text-white transition-colors" max="9" maxlength="1" oninput="if(this.value.length &gt; 1) this.value = this.value.slice(0, 1); if(this.value.length == 1) this.nextElementSibling?.focus()" onkeydown="if(event.key === 'Backspace' &amp;&amp; !this.value) this.previousElementSibling?.focus()" placeholder="-" type="number"/>
<input class="flex h-16 w-14 text-center text-2xl font-bold border-0 border-b-2 border-gray-200 dark:border-gray-700 bg-transparent focus:border-primary focus:ring-0 text-[#0d121b] dark:text-white transition-colors" max="9" maxlength="1" oninput="if(this.value.length &gt; 1) this.value = this.value.slice(0, 1); if(this.value.length == 1) this.nextElementSibling?.focus()" onkeydown="if(event.key === 'Backspace' &amp;&amp; !this.value) this.previousElementSibling?.focus()" placeholder="-" type="number"/>
<input class="flex h-16 w-14 text-center text-2xl font-bold border-0 border-b-2 border-gray-200 dark:border-gray-700 bg-transparent focus:border-primary focus:ring-0 text-[#0d121b] dark:text-white transition-colors" max="9" maxlength="1" oninput="if(this.value.length &gt; 1) this.value = this.value.slice(0, 1);" onkeydown="if(event.key === 'Backspace' &amp;&amp; !this.value) this.previousElementSibling?.focus()" placeholder="-" type="number"/>
</div>
<div class="text-center mb-10">
<p class="text-gray-500 dark:text-gray-400 text-sm mb-2">Didn't receive the code?</p>
<button class="text-primary text-base font-semibold hover:text-primary/80 transition-colors">
                        Resend Code
                    </button>
<p class="mt-4 text-[10px] text-gray-400 uppercase tracking-widest font-medium">Available in 00:45</p>
</div>
<div class="pt-2">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-2xl text-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                        Verify &amp; Proceed
                    </button>
<div class="mt-6 flex flex-col items-center">
<div class="flex items-center gap-2 text-gray-400 text-xs">
<span class="material-symbols-outlined text-sm">lock</span>
<span>Secure Exam Environment</span>
</div>
</div>
</div>
</main>
<div class="h-8 w-full bg-white dark:bg-[#1a1f2e]"></div>
</div>
</div>

</body></html>
