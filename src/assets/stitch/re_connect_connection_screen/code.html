<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Re-connect Connection Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3B82F6",
                        "brand-blue": "#EBF3FF",
                        "brand-blue-dark": "#1E3A8A",
                        "background-light": "#F8FAFC",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    animation: {
                        'soft-pulse': 'soft-pulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        'soft-pulse': {
                            '0%, 100%': { opacity: 1, transform: 'scale(1)' },
                            '50%': { opacity: 0.5, transform: 'scale(0.98)' },
                        }
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .animate-soft-pulse {
                animation: soft-pulse 2s ease-in-out infinite;
            }
        }
        body {
            min-height: 100dvh;
            background-color: #F8FAFC;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light font-display text-slate-800 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden bg-gradient-to-b from-brand-blue/30 to-white">
<div class="flex items-center px-6 pt-12 pb-4 justify-between">
<div class="flex size-10 shrink-0 items-center justify-center rounded-full bg-white/50 backdrop-blur-sm border border-blue-100/50 cursor-pointer active:scale-90 transition-transform">
<span class="material-symbols-outlined text-xl text-slate-400">close</span>
</div>
<div class="flex-1 text-center pr-10">
<span class="text-xs font-bold uppercase tracking-widest text-blue-400/80">Exam Guard</span>
</div>
</div>
<div class="flex-1 flex flex-col items-center justify-center px-8">
<div class="relative flex items-center justify-center w-full mb-12">
<div class="absolute w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute w-40 h-40 border border-primary/10 rounded-full"></div>
<div class="absolute w-56 h-56 border border-primary/5 rounded-full"></div>
<div class="relative z-10 bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-blue-200/40 border border-blue-50">
<div class="relative">
<span class="material-symbols-outlined text-7xl text-primary/40 leading-none">wifi_off</span>
<div class="absolute -top-1 -right-1 w-4 h-4 bg-red-400 rounded-full border-4 border-white"></div>
</div>
</div>
</div>
<div class="flex flex-col items-center gap-4 text-center">
<h1 class="text-3xl font-extrabold tracking-tight text-slate-900">You're Offline</h1>
<p class="text-[15px] font-medium leading-relaxed text-slate-500 max-w-[280px]">
                    Don't worry, your progress is saved. Please check your internet to continue your exam.
                </p>
</div>
<div class="mt-14 w-full max-w-[280px]">
<button class="group relative w-full flex items-center justify-center overflow-hidden rounded-2xl h-16 bg-primary text-white text-lg font-bold shadow-xl shadow-blue-500/30 hover:shadow-blue-500/40 transition-all active:scale-95">
<span class="relative z-10">Try Again</span>
</button>
</div>
<div class="mt-8 flex items-center gap-3 animate-soft-pulse">
<div class="flex h-2.5 w-2.5 items-center justify-center">
<span class="absolute inline-flex h-2.5 w-2.5 rounded-full bg-primary/40 animate-ping"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</div>
<p class="text-sm font-semibold text-primary">Reconnecting...</p>
</div>
</div>
<div class="px-8 pb-12">
<div class="flex flex-col items-center gap-4">
<div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
<div class="bg-primary/40 h-full w-1/3 rounded-full transition-all duration-1000"></div>
</div>
<div class="flex justify-between w-full">
<p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Auto-retry active</p>
<p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-right">Attempt 2/5</p>
</div>
</div>
</div>
<div class="h-2 w-32 bg-slate-200 rounded-full mx-auto mb-2"></div>
</div>

</body></html>
